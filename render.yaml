databases:
  - name: giftcards-db
    databaseName: giftcards
    user: giftcards_user

services:
  - type: web
    name: giftcards-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: giftcards-db
          property: connectionString
      - key: FRONTEND_ORIGINS
        sync: false
